[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
# Revert strings help with debugging
revert_strings = "debug"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Testnet profile — uses mock price feed
[profile.testnet]
src = "src"
out = "out"
libs = ["lib"]

# Production profile — stricter, no test helpers compiled in
[profile.production]
src = "src"
out = "out"
libs = ["lib"]
optimizer_runs = 1000
revert_strings = "strip"

[rpc_endpoints]
base         = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base         = { key = "${BASESCAN_API_KEY}", chain = 8453,  url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
