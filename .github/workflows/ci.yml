name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript checks ────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck Frontend
        run: npm run typecheck --workspace=frontend

  # ── Smart Contracts ──────────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Run contract tests
        working-directory: contracts
        run: forge test -vv
        env:
          ETH_SEPOLIA_RPC_URL: https://rpc.sepolia.org

  # ── Deploy frontend to Netlify (main branch only) ────────────
  deploy-frontend:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: production
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          # Falls back to empty string if secret not set — WalletConnect simply won't init
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || '' }}
          NEXT_PUBLIC_ETH_SEPOLIA_RPC_URL: ${{ secrets.NEXT_PUBLIC_ETH_SEPOLIA_RPC_URL || 'https://ethereum-sepolia-rpc.publicnode.com' }}
          NEXT_PUBLIC_BASE_RPC_URL: https://mainnet.base.org
          NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL: https://sepolia.base.org
          NEXT_PUBLIC_VAULT_ADDRESS: ${{ secrets.NEXT_PUBLIC_VAULT_ADDRESS }}
          NEXT_PUBLIC_SPOT_ENGINE_ADDRESS: ${{ secrets.NEXT_PUBLIC_SPOT_ENGINE_ADDRESS }}
          NEXT_PUBLIC_PERP_ENGINE_ADDRESS: ${{ secrets.NEXT_PUBLIC_PERP_ENGINE_ADDRESS }}
          NEXT_PUBLIC_PRICE_FEED_ADDRESS: ${{ secrets.NEXT_PUBLIC_PRICE_FEED_ADDRESS }}
          NEXT_PUBLIC_MOCK_USDT_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_USDT_ADDRESS }}
          NEXT_PUBLIC_MOCK_BTC_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_BTC_ADDRESS }}
          NEXT_PUBLIC_MOCK_SOL_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_SOL_ADDRESS }}
          NEXT_PUBLIC_MOCK_DOGE_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_DOGE_ADDRESS }}
          NEXT_PUBLIC_MOCK_AVAX_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_AVAX_ADDRESS }}
          NEXT_PUBLIC_MOCK_LINK_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_LINK_ADDRESS }}
          NEXT_PUBLIC_MOCK_AERO_ADDRESS: ${{ secrets.NEXT_PUBLIC_MOCK_AERO_ADDRESS }}

      - name: Deploy to Netlify
        run: netlify deploy --prod
