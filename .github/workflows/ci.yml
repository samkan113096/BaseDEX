name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend typecheck ─────────────────────────────────────────
  backend:
    name: Backend TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck
        run: npm run typecheck

  # ── Frontend typecheck (no build — Netlify handles that) ──────
  frontend:
    name: Frontend TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeCheck
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: 2588910233967fa9ce4c62e8865399c3
          NEXT_PUBLIC_API_URL: https://basedex-production.up.railway.app
          NEXT_PUBLIC_WS_URL: wss://basedex-production.up.railway.app/ws

  # ── Smart contracts ───────────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Run contract tests
        working-directory: contracts
        run: forge test -vv
        env:
          ETH_SEPOLIA_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com

  # NOTE: Deployment is handled automatically:
  #   Frontend → Netlify detects pushes to samkan113096/BaseDEX and deploys
  #   Backend  → Railway detects pushes to samkan113096/BaseDEX and deploys
  # No deploy steps needed here — they would just double-deploy.
