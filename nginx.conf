# ============================================================
# BaseDEX — Nginx Config for Hostinger VPS
# ============================================================
# Install: copy to /etc/nginx/sites-available/basedex
#   sudo ln -s /etc/nginx/sites-available/basedex /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.basedex.fi
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m  rate=10r/s;

# Upstream: Fastify backend
upstream basedex_backend {
  server 127.0.0.1:3001;
  keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name api.basedex.fi;
  return 301 https://$host$request_uri;
}

# ── HTTPS API server ──────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.basedex.fi;

  # SSL — managed by Certbot
  ssl_certificate     /etc/letsencrypt/live/api.basedex.fi/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.basedex.fi/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy "origin-when-cross-origin" always;

  # Gzip
  gzip on;
  gzip_types application/json text/plain;
  gzip_min_length 1000;

  # ── REST API ─────────────────────────────────────────────
  location /api/ {
    limit_req zone=api_limit burst=200 nodelay;

    proxy_pass         http://basedex_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host             $host;
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;
  }

  # ── WebSocket ─────────────────────────────────────────────
  location /ws {
    limit_req zone=ws_limit burst=20 nodelay;

    proxy_pass         http://basedex_backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 3600s;   # Keep WS connections alive for 1 hour
    proxy_send_timeout 3600s;
  }

  # ── Health check ──────────────────────────────────────────
  location /health {
    proxy_pass       http://basedex_backend;
    proxy_http_version 1.1;
    access_log off;
  }

  # ── Block common attack paths ─────────────────────────────
  location ~ /\. { deny all; }
  location ~ /(\.env|\.git) { deny all; }
}
